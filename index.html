<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC像素画转换器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#00d4ff;margin:20px 0;text-shadow:0 0 20px rgba(0,212,255,0.3)}
.container{max-width:900px;width:100%;display:flex;flex-direction:column;gap:20px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;backdrop-filter:blur(10px)}
.card h2{color:#00d4ff;margin-bottom:16px;font-size:18px}
.upload-zone{border:2px dashed rgba(0,212,255,0.4);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .3s}
.upload-zone:hover{border-color:#00d4ff;background:rgba(0,212,255,0.05)}
.upload-zone.active{border-color:#00ff88;background:rgba(0,255,136,0.05)}
.controls{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:16px}
.controls label{font-size:14px;color:#aaa}
.controls select,.controls input[type=number]{background:#2a2a4a;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 12px;border-radius:8px;font-size:14px}
.preview-area{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.preview-area canvas{border:1px solid rgba(255,255,255,0.2);border-radius:8px;image-rendering:pixelated}
.preview-label{text-align:center;font-size:12px;color:#888;margin-top:4px}
.output-box{position:relative}
.output-box textarea{width:100%;height:120px;background:#0d0d1a;border:1px solid rgba(0,212,255,0.3);color:#00ff88;font-family:'Consolas',monospace;font-size:13px;padding:12px;border-radius:8px;resize:vertical}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;transition:all .3s}
.btn-primary{background:linear-gradient(135deg,#00d4ff,#0088ff);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,212,255,0.4)}
.btn-copy{background:linear-gradient(135deg,#00ff88,#00cc66);color:#000}
.btn-copy:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,255,136,0.4)}
.btn-download{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;font-size:12px;padding:6px 16px;margin-top:6px}
.btn-download:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(168,85,247,0.4)}
.status{padding:8px 16px;border-radius:8px;font-size:14px;margin-top:8px}
.status.ok{background:rgba(0,255,136,0.1);color:#00ff88}
.status.warn{background:rgba(255,165,0,0.1);color:#ffa500}
.steps{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
.step{flex:1;min-width:200px;background:rgba(0,212,255,0.05);border-radius:12px;padding:16px;text-align:center}
.step .num{display:inline-block;width:32px;height:32px;line-height:32px;border-radius:50%;background:#00d4ff;color:#000;font-weight:bold;margin-bottom:8px}
.step p{font-size:13px;color:#aaa}
.info{font-size:12px;color:#666;margin-top:8px}
.hidden{display:none}
</style>
</head>
<body>
<h1>🎨 MC像素画转换器</h1>
<div class="container">
<div class="card">
<div class="steps">
<div class="step"><div class="num">1</div><p>拖入或选择图片</p></div>
<div class="step"><div class="num">2</div><p>调整大小</p></div>
<div class="step"><div class="num">3</div><p>复制代码</p></div>
<div class="step"><div class="num">4</div><p>游戏里粘贴</p></div>
</div>
</div>

<div class="card">
<h2>📁 选择图片</h2>
<div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
<p style="font-size:18px;margin-bottom:8px">📷 点击选择图片 或 拖拽到这里</p>
<p style="color:#888">支持 PNG / JPG / BMP / GIF</p>
</div>
<input type="file" id="fileInput" accept="image/*" class="hidden">
<div class="controls">
<label>最长边像素:</label>
<select id="sizeSelect" class="dropdown">
<option value="16">16 x 16 (迷你)</option>
<option value="32">32 x 32 (小)</option>
<option value="48" selected>48 x 48 (中等)</option>
<option value="64">64 x 64 (大)</option>
<option value="96">96 x 96 (超大 - 需分段)</option>
<option value="128">128 x 128 (极光 - 需分段)</option>
</select>
<label>模式:</label>
<select id="modeSelect">
<option value="wall">竖直墙面(wall)</option>
<option value="flat">水平地面(flat)</option>
</select>
<label>厚度:</label>
<input type="number" id="thicknessInput" value="1" min="1" max="16" style="width: 60px; background: #2a2a40; color: #fff; border: 1px solid #446; border-radius: 4px; padding: 4px;">
<label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
  <input type="checkbox" id="hollowCheckbox" style="cursor:pointer;">
  空心
</label>
<label>去噪:</label>
<select id="denoiseSelect">
<option value="0">关闭</option>
<option value="1" selected>轻度 (1次)</option>
<option value="2">中度 (2次)</option>
<option value="3">强力 (3次)</option>
<option value="5">极强 (5次)</option>
<option value="8">超强 (8次)</option>
<option value="12">最强 (12次)</option>
</select>
</div>
</div>

<div class="card hidden" id="previewCard">
<h2>👁️ 预览</h2>
<div class="preview-area">
<div><canvas id="origCanvas" width="128" height="128"></canvas><div class="preview-label">原图</div><button class="btn btn-download" onclick="downloadCanvas('origCanvas','原图预览.png')">⬇️ 下载原图预览</button></div>
<div><canvas id="mcCanvas" width="128" height="128"></canvas><div class="preview-label">MC方块效果</div><button class="btn btn-download" onclick="downloadCanvas('mcCanvas','MC效果预览.png')">⬇️ 下载MC效果图</button></div>
</div>
</div>

<div class="card hidden" id="outputCard">
<h2>📋 复制到游戏</h2>
<p style="color:#aaa;margin-bottom:12px">将下面的命令复制到MC聊天栏中发送即可构建:</p>
<div id="outputContainer" style="display:flex; flex-direction:column; gap:12px;">
</div>
<div class="info" id="outputInfo"></div>
<div class="status warn" id="warnMsg" style="display:none"></div>
</div>
</div>

function colorDist(r1,g1,b1,r2,g2,b2){
  return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
}

function findClosest(r,g,b){
  let best=0,bestD=99999;
  for(let i=0;i<PALETTE.length;i++){
    const d=colorDist(r,g,b,PALETTE[i][1],PALETTE[i][2],PALETTE[i][3]);
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}

// RLE压缩: "AAABBC" -> "3A2BC"
function rleEncode(str){
  let result='',i=0;
  while(i<str.length){
    let c=str[i],count=1;
    while(i+count<str.length && str[i+count]===c) count++;
    if(count>1) result+=count+c;
    else result+=c;
    i+=count;
  }
  return result;
}

let currentImage=null;

// 去噪: 3x3 模式滤波，消除少数派杂色点
// threshold: 当前颜色在邻域出现次数 <= threshold 时替换为众数
function denoiseIndices(indices, w, h, threshold) {
  const result = indices.slice();
  for(let y=0; y<h; y++) {
    for(let x=0; x<w; x++) {
      const idx = y*w+x;
      const cur = indices[idx];
      if(cur === -1) continue; // 跳过透明
      // 统计3x3邻域颜色频次
      const freq = {};
      let neighborCount = 0;
      for(let dy=-1; dy<=1; dy++) {
        for(let dx=-1; dx<=1; dx++) {
          const ny=y+dy, nx=x+dx;
          if(ny<0||ny>=h||nx<0||nx>=w) continue;
          const ni = indices[ny*w+nx];
          if(ni === -1) continue;
          freq[ni] = (freq[ni]||0) + 1;
          neighborCount++;
        }
      }
      // 当前颜色出现次数不超过阈值，且不是邻域中最多的颜色，替换为众数
      const curCount = freq[cur]||0;
      if(curCount <= threshold && neighborCount > 1) {
        let maxCnt=0, best=cur;
        for(const [c, cnt] of Object.entries(freq)) {
          if(cnt > maxCnt) { maxCnt=cnt; best=parseInt(c); }
        }
        if(maxCnt > curCount) result[idx] = best;
      }
    }
  }
  return result;
}

function processImage(){
  if(!currentImage) return;
  const maxSide=parseInt(document.getElementById('sizeSelect').value);
  const mode=document.getElementById('modeSelect').value;
  const denoisePasses=parseInt(document.getElementById('denoiseSelect').value);

  // 按比例计算宽高
  const imgW=currentImage.width, imgH=currentImage.height;
  let w,h;
  if(imgW>=imgH){
    w=maxSide;
    h=Math.max(1,Math.round(maxSide*imgH/imgW));
  } else {
    h=maxSide;
    w=Math.max(1,Math.round(maxSide*imgW/imgH));
  }

  // === 区域平均采样 (Area-average resampling) ===
  // 先在全分辨率画布上获取原图像素数据
  const fullCanvas=document.createElement('canvas');
  fullCanvas.width=imgW; fullCanvas.height=imgH;
  const fullCtx=fullCanvas.getContext('2d');
  fullCtx.drawImage(currentImage,0,0,imgW,imgH);
  const fullData=fullCtx.getImageData(0,0,imgW,imgH).data;

  // 对每个目标像素，计算源区域所有像素的加权平均
  const avgR=new Float64Array(w*h);
  const avgG=new Float64Array(w*h);
  const avgB=new Float64Array(w*h);
  const avgA=new Float64Array(w*h);

  for(let ty=0; ty<h; ty++){
    // 精确的源区域范围(浮点)
    const srcY0 = ty * imgH / h;
    const srcY1 = (ty+1) * imgH / h;
    for(let tx=0; tx<w; tx++){
      const srcX0 = tx * imgW / w;
      const srcX1 = (tx+1) * imgW / w;

      // 整数像素范围
      const iy0=Math.floor(srcY0), iy1=Math.min(Math.ceil(srcY1), imgH);
      const ix0=Math.floor(srcX0), ix1=Math.min(Math.ceil(srcX1), imgW);

      let rSum=0, gSum=0, bSum=0, aSum=0, wSum=0;
      for(let sy=iy0; sy<iy1; sy++){
        // 该行在目标像素中的覆盖权重
        const wy = Math.min(sy+1, srcY1) - Math.max(sy, srcY0);
        for(let sx=ix0; sx<ix1; sx++){
          const wx = Math.min(sx+1, srcX1) - Math.max(sx, srcX0);
          const weight = wx * wy;
          const si=(sy*imgW+sx)*4;
          rSum+=fullData[si]*weight;
          gSum+=fullData[si+1]*weight;
          bSum+=fullData[si+2]*weight;
          aSum+=fullData[si+3]*weight;
          wSum+=weight;
        }
      }
      const ti=ty*w+tx;
      avgR[ti]=rSum/wSum; avgG[ti]=gSum/wSum;
      avgB[ti]=bSum/wSum; avgA[ti]=aSum/wSum;
    }
  }

  // 映射到调色板索引
  let paletteIdx = new Int16Array(w*h);
  for(let i=0; i<w*h; i++){
    if(avgA[i] < 128){
      paletteIdx[i] = -1; // 透明
    } else {
      paletteIdx[i] = findClosest(Math.round(avgR[i]), Math.round(avgG[i]), Math.round(avgB[i]));
    }
  }

  // 去噪滤波 (逐轮递增阈值，越往后越激进)
  for(let pass=0; pass<denoisePasses; pass++){
    // 阈值逐步提高: 1,1,2,2,3,3,4,4,...
    const threshold = Math.min(1 + Math.floor(pass / 2), 5);
    paletteIdx = denoiseIndices(paletteIdx, w, h, threshold);
  }

  // 生成编码和像素颜色数据
  let codes='';
  const mcPixels=[];
  for(let i=0; i<w*h; i++){
    const pi=paletteIdx[i];
    if(pi===-1){
      codes+='空';
      mcPixels.push(null);
    } else {
      codes+=PALETTE[pi][0];
      mcPixels.push([PALETTE[pi][1],PALETTE[pi][2],PALETTE[pi][3]]);
    }
  }

  // 绘制预览 (每像素8px)
  const scale=8;
  const origC=document.getElementById('origCanvas');
  const origCtx=origC.getContext('2d');
  origC.width=w*scale; origC.height=h*scale;
  origCtx.imageSmoothingEnabled=false;
  origCtx.drawImage(currentImage,0,0,w*scale,h*scale);

  const mcC=document.getElementById('mcCanvas');
  const mcCtx=mcC.getContext('2d');
  mcC.width=w*scale; mcC.height=h*scale;
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const p=mcPixels[y*w+x];
      if (p === null) {
        mcCtx.clearRect(x*scale,y*scale,scale,scale);
      } else {
        mcCtx.fillStyle=`rgb(${p[0]},${p[1]},${p[2]})`;
        mcCtx.fillRect(x*scale,y*scale,scale,scale);
      }
    }
  }

  // RLE压缩
  const compressed=rleEncode(codes);
  const thickness = parseInt(document.getElementById('thicknessInput').value) || 1;
  const hollow = document.getElementById('hollowCheckbox').checked ? 1 : 0;
  
  // 分块处理 (避免超过625个字符限制)
  const MAX_CHUNK = 500;
  const chunks = [];
  for(let i=0; i<compressed.length; i+=MAX_CHUNK) {
    chunks.push(compressed.substring(i, i+MAX_CHUNK));
  }

  const outputContainer = document.getElementById('outputContainer');
  outputContainer.innerHTML = '';
  
  if (chunks.length === 1) {
    const cmd = `-img paste ${w} ${h} ${mode} ${thickness} ${hollow} ${chunks[0]}`;
    outputContainer.innerHTML = `
      <div class="output-box">
        <textarea id="out_0" readonly>${cmd}</textarea>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn btn-copy" onclick="copyText('out_0', 'status_0')">📋 一键复制</button>
        <span id="status_0"></span>
      </div>
    `;
  } else {
    let html = `<p style="color:#ffa500; font-weight:bold;">⚠️ 图案较复杂，需要分 ${chunks.length} 次粘贴发送：</p>`;
    for(let i=0; i<chunks.length; i++) {
      let cmd;
      if (i === chunks.length - 1) {
        cmd = `-img paste ${w} ${h} ${mode} ${thickness} ${hollow} ${chunks[i]}`;
      } else {
        cmd = `-img add ${chunks[i]}`;
      }
      html += `
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
          <span style="color:#00d4ff; width:60px;">第 ${i+1} 步:</span>
          <input type="text" id="out_${i}" value="${cmd}" readonly style="flex:1; background:#0d0d1a; border:1px solid rgba(0,212,255,0.3); color:#00ff88; padding:8px; border-radius:4px; font-family:monospace;">
          <button class="btn btn-copy" style="padding:8px 16px;" onclick="copyText('out_${i}', 'status_${i}')">📋 复制</button>
          <span id="status_${i}" style="width:80px; font-size:12px;"></span>
        </div>
      `;
    }
    outputContainer.innerHTML = html;
  }

  document.getElementById('previewCard').classList.remove('hidden');
  document.getElementById('outputCard').classList.remove('hidden');

  const uniqueColors = new Set(paletteIdx).size - (paletteIdx.indexOf(-1)>=0 ? 1 : 0);
  document.getElementById('outputInfo').textContent=
    `图案: ${w}x${h} (原始${imgW}x${imgH}) = ${w*h}个方块 | 使用${uniqueColors}种颜色 | 去噪${denoisePasses}次 | 压缩后${compressed.length}字符`;
  document.getElementById('warnMsg').style.display='none';
}

// 文件上传
document.getElementById('fileInput').addEventListener('change',function(e){
  if(e.target.files[0]) loadFile(e.target.files[0]);
});

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('active');});
dz.addEventListener('dragleave',function(){this.classList.remove('active');});
dz.addEventListener('drop',function(e){
  e.preventDefault();this.classList.remove('active');
  if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      currentImage=img;
      document.getElementById('dropZone').innerHTML=
        `<p style="color:#00ff88">✅ 已加载: ${file.name} (${img.width}x${img.height})</p>`;
      processImage();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('sizeSelect').addEventListener('change',processImage);
document.getElementById('modeSelect').addEventListener('change',processImage);
document.getElementById('thicknessInput').addEventListener('change',processImage);
document.getElementById('hollowCheckbox').addEventListener('change',processImage);
document.getElementById('denoiseSelect').addEventListener('change',processImage);

function copyText(inputId, statusId){
  const t=document.getElementById(inputId);
  t.select();
  document.execCommand('copy');
  const s=document.getElementById(statusId);
  s.textContent='✅ 已复制';
  s.style.color='#00ff88';
  setTimeout(()=>{s.textContent='';},3000);
}

function downloadCanvas(canvasId, filename){
  const canvas=document.getElementById(canvasId);
  const link=document.createElement('a');
  link.download=filename;
  link.href=canvas.toDataURL('image/png');
  link.click();
}
